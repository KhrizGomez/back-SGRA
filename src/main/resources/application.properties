spring.application.name=Backend

# ==========================================
# Azure Key Vault (secretos centralizados)
# ==========================================
spring.cloud.azure.keyvault.secret.property-sources[0].endpoint=https://kv-sgra.vault.azure.net/
#
# Secretos en Key Vault y sus mappings explicitos:
#   sgra-master-key                                    -> ${sgra-master-key}
#   groq-api-key                                       -> ${groq-api-key}
#   spring-datasource-password                         -> ${spring-datasource-password}
#   spring-cloud-azure-storage-blob-connection-string  -> ${spring-cloud-azure-storage-blob-connection-string}

# ==========================================
# Base de datos PostgreSQL
# ==========================================
spring.datasource.url=jdbc:postgresql://sgra-postgres.postgres.database.azure.com:5432/SGRA-NO-DATA-09?sslmode=require&currentSchema=seguridad,reforzamiento,academico,general,public
spring.datasource.username=sgra_app
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace

# ==========================================
# Servidor
# ==========================================
server.port=8080
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ==========================================
# Pool de conexiones dinamico por usuario
# ==========================================
sgra.pool.max-size-per-user=3
sgra.pool.idle-timeout-minutes=10
sgra.pool.max-lifetime-minutes=30
sgra.pool.cleanup-interval-minutes=5

# ==========================================
# Groq Cloud AI
# ==========================================
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${groq-api-key}
groq.model=llama-3.3-70b-versatile
groq.max-tokens=4096
groq.temperature=0.1
groq.timeout-seconds=10

# ==========================================
# Azure Blob Storage
# ==========================================
spring.cloud.azure.storage.blob.container-name=archivos-sgra
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

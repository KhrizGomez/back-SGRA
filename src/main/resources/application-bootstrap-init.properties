# Perfil de bootstrap: ejecutar schema.sql con psql (primer arranque)
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none
spring.task.scheduling.enabled=false

# Credenciales de inicializacion (separadas del usuario runtime)
spring.sql.init.username=postgres
spring.sql.init.password=12345

# Config bootstrap por psql
bootstrap.psql.command=C:/Program Files/PostgreSQL/18/bin/psql.exe
bootstrap.psql.marker-function=reforzamiento.fn_get_ids_sesiones_proximas()
bootstrap.psql.marker-view=seguridad.vw_gusuariosgroles
bootstrap.psql.marker-schema=seguridad
bootstrap.psql.marker-table=tbroles

